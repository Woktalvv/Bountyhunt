name: BountyHunt
version: 1.0
main: me.woktalvv.bountyhunt.BountyHuntPlugin
api-version: "1.26"
authors: [Woktalvv]
description: A bounty hunting plugin with anonymous targets, prep time, and distance tracking.
commands:
  bounty:
    description: Start a bounty hunt.
    usage: /bounty start
    permission: bounty.use
permissions:
  bounty.use:
    description: Allows players to start bounty hunts.
    default: true
  bounty.admin:
    description: Allows access to admin features.
    default: op
